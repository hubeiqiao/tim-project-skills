<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>TIM Project Skills — OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f5f7;
    width: 1280px;
    height: 640px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(rgba(0,0,0,0.012) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px;
    pointer-events: none;
    z-index: 10;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 1174px;
    height: 534px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 12px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  /* Thick gradient strip — visible even at thumbnail */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #0071e3 0%, #00b4d8 40%, #34d399 70%, #059669 100%);
    border-radius: 20px 20px 0 0;
  }

  /* Title — MASSIVE, readable at any size */
  .title {
    font-family: 'Sora', sans-serif;
    font-size: 76px;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: #1d1d1f;
    line-height: 1;
    margin-bottom: 20px;
  }

  .title span {
    color: #0071e3;
  }

  /* Single tagline — large enough to read at thumbnail */
  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px;
    font-weight: 500;
    color: #86868b;
    line-height: 1.4;
    margin-bottom: 36px;
  }

  /* Install — dark block, high contrast, readable */
  .install {
    background: #1d1d1f;
    border-radius: 14px;
    padding: 16px 36px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .install-dollar {
    font-family: 'DM Sans', monospace;
    font-size: 17px;
    font-weight: 600;
    color: #555;
  }

  .install-text {
    font-family: 'DM Sans', monospace;
    font-size: 17px;
    font-weight: 600;
    color: #f5f5f7;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="title">TIM Project <span>Skills</span></div>
  <div class="tagline">AI agent skills for Carleton TIM project reports</div>
  <div class="install">
    <span class="install-dollar">$</span>
    <span class="install-text">npx skills add hubeiqiao/tim-project-skills</span>
  </div>
</div>

</body>
</html>
