<!DOCTYPE html>

<head>

<title>TIM Project Skills — OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f7;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    width: 1280px;
    height: 640px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1200px;
    height: 560px;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 80px;
    gap: 28px;
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .github-icon {
    width: 48px;
    height: 48px;
  }

  .title {
    font-family: 'Sora', system-ui, sans-serif;
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #1d1d1f;
    line-height: 1;
  }

  .subtitle {
    font-size: 20px;
    color: #6e6e73;
    line-height: 1.5;
    max-width: 680px;
  }

  .features {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .pill {
    background: #f0f0f2;
    color: #1d1d1f;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
  }

  .install {
    margin-top: 4px;
    font-family: 'DM Sans', monospace;
    font-size: 17px;
    font-weight: 500;
    color: #86868b;
    background: #f5f5f7;
    padding: 12px 28px;
    border-radius: 12px;
    letter-spacing: -0.01em;
  }

  .install span {
    color: #1d1d1f;
    font-weight: 600;
  }

</head>
